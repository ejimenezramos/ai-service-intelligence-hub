<div class="card assistant-card assistant-card-call">
  <div class="assistant-topline">
    <span class="assistant-kicker">Call suggestion</span>
  </div>

  <h4>{{title}}</h4>

  <div class="assistant-meta">
    <div>
      <span class="meta-label">Stakeholders / teams</span>
      <span class="meta-value">{{stakeholder_summary}}</span>
    </div>
    <div>
      <span class="meta-label">Purpose</span>
      <span class="meta-value">{{purpose}}</span>
    </div>
  </div>

  <div class="assistant-actions">
    <a href="{{calendar_link}}" target="_blank" class="icon-link calendar-link" rel="noopener noreferrer" title="Open pre-filled Google Calendar event">
      <span class="icon-badge">Cal</span>
      <span>Google Calendar</span>
    </a>
  </div>
</div>
