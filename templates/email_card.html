<div class="card assistant-card assistant-card-email">
  <div class="assistant-topline">
    <span class="assistant-kicker">Email suggestion</span>
    <span class="assistant-impact">{{impact_summary}}</span>
  </div>

  <h4>{{subject}}</h4>

  <div class="assistant-meta">
    <div>
      <span class="meta-label">Stakeholders / teams</span>
      <span class="meta-value">{{stakeholder_summary}}</span>
    </div>
  </div>

  <div class="assistant-actions">
    <a href="{{gmail_link}}" target="_blank" class="icon-link gmail-link" rel="noopener noreferrer" title="Open pre-filled Gmail draft">
      <span class="icon-badge">G</span>
      <span>Gmail</span>
    </a>
    <a href="{{outlook_link}}" target="_blank" class="icon-link outlook-link" rel="noopener noreferrer" title="Open pre-filled Outlook draft">
      <span class="icon-badge">O</span>
      <span>Outlook</span>
    </a>
  </div>
</div>
